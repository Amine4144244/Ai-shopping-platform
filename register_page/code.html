<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Register | ShopAI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1313ec",
                "background-light": "#f6f6f8",
                "background-dark": "#101022",
              },
              fontFamily: {
                "display": ["Manrope", "sans-serif"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar (Simplified for Auth) -->
<header class="w-full px-6 py-5 flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="flex items-center gap-2 group cursor-pointer">
<div class="bg-primary p-2 rounded-lg text-white">
<span class="material-symbols-outlined block" style="font-size: 24px;">shopping_bag</span>
</div>
<h1 class="text-xl font-extrabold tracking-tight text-slate-900 dark:text-white uppercase">Shop<span class="text-primary">AI</span></h1>
</div>
<div>
<a class="text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-primary dark:hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 sm:p-12">
<div class="w-full max-w-[480px]">
<!-- Registration Card -->
<div class="bg-white dark:bg-slate-900/50 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-800 p-8 sm:p-10">
<!-- Header Text -->
<div class="text-center mb-8">
<h2 class="text-3xl font-bold tracking-tight mb-2">Create an account</h2>
<p class="text-slate-500 dark:text-slate-400">Join the future of intelligent shopping.</p>
</div>
<!-- Registration Form -->
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-11 pr-12 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Min. 8 characters" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Confirm Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
</div>
<input class="w-full bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-lg py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-slate-900 dark:text-white placeholder:text-slate-400 dark:placeholder:text-slate-500" placeholder="Repeat password" type="password"/>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 py-2">
<input class="mt-1 size-4 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary/30 bg-white dark:bg-slate-800" id="terms" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400 leading-snug" for="terms">
                            I agree to the <a class="text-primary hover:underline font-medium" href="#">Terms of Service</a> and <a class="text-primary hover:underline font-medium" href="#">Privacy Policy</a>.
                        </label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98]" type="submit">
                        Create Account
                    </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<span class="w-full border-t border-slate-200 dark:border-slate-800"></span>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-500 dark:text-slate-400 font-medium tracking-wider">Or register with</span>
</div>
</div>
<!-- Social Registration -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Google Logo" class="size-5" data-alt="Google logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDK8c2l92nn-VVo_Jb15yiX12Qt0EgG0xubtCn788vrApideXv6llvANb8E2h9vO_cSjWxcv_3HclbcXOjC3CQsz7tQFXoBgJZ1Omjhi2PVMNDxOcv-NV7f2Y_txhYdbJ15JPwOEI0JJ9dLolzYO3_0nwenYJv6e3ZxWq072n8cQLsIBG76HcbDXvkYoQT7M1Zpy3iqC7GheHgUI6zDx1-ypg4lGd0mUGecZQKRgRQnF_XoUKneQMGdC6r8v2qWc7sFgUSIjo8FteA"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<img alt="Apple Logo" class="size-5 dark:invert" data-alt="Apple logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgxhtj49DnHR9dAzsu4gOP5nSzzHbzX7TElXu3eEjt9pRYKbQsnqa-8dEbQHo2IQz02mCv9wsXXl9GgSke1SzRe977BCjVUb7og6unZ14WexsOnpDmsvxhWr7Fd84b3HkpZDg5UnTPcgV-EBqQMgpTHRaEJHPV9kwhBRgu96zPFw3FbzslPGirYFItq74z-qitsii5TclzC_iABFckbjoUeFQTS4oeoqVpqc-RKyqNMbXLggTc4m9PHfkveGIbBVApgSC8bw2LHpA"/>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
<!-- Login Redirect -->
<p class="text-center mt-8 text-sm text-slate-600 dark:text-slate-400">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline transition-all" href="#">Log in here</a>
</p>
</div>
<!-- Footer Links -->
<footer class="mt-8 flex justify-center gap-6 text-xs text-slate-400 dark:text-slate-600 font-medium">
<a class="hover:text-slate-600 dark:hover:text-slate-400 transition-colors uppercase tracking-widest" href="#">Pricing</a>
<a class="hover:text-slate-600 dark:hover:text-slate-400 transition-colors uppercase tracking-widest" href="#">API</a>
<a class="hover:text-slate-600 dark:hover:text-slate-400 transition-colors uppercase tracking-widest" href="#">Contact</a>
</footer>
</div>
</main>
</body></html>
