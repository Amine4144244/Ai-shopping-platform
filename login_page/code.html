<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#1313ec",
                "background-light": "#f6f6f8",
                "background-dark": "#101022",
              },
              fontFamily: {
                "display": ["Manrope"]
              },
              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            },
          },
        }
    </script>
<title>AI Shopper - Login</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="w-full border-b border-primary/10 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md sticky top-0 z-50">
<div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">shopping_cart_checkout</span>
</div>
<h1 class="text-xl font-extrabold tracking-tight">AI Shopper</h1>
</div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-sm font-semibold hover:text-primary transition-colors" href="#">Products</a>
<a class="text-sm font-semibold hover:text-primary transition-colors" href="#">AI Assistant</a>
</nav>
<div class="flex items-center gap-4">
<button class="bg-primary text-white text-sm font-bold px-6 py-2 rounded-lg hover:opacity-90 transition-opacity">
                    Login
                </button>
<div class="size-8 rounded-full overflow-hidden border border-primary/20">
<img class="w-full h-full object-cover" data-alt="User avatar placeholder with abstract pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD4wwfPGSVkE8rzIhBc6FZ3tJ_cltTlF9SyZro4qSiJqhec84fEnotLWzqMmkVKEmYJatK2EjvK_bFnUbUxvWbOTvblXPUldkPtyt9-r0O-5bcC3XQsdc_5pFPQSrvbgtiaj6KhJlNx1EtcxlWtlgpYrubMWMnGPpPLfv8I9xy-HxRhmDRSC-CribeINj9dJrhHt_kc2A3Pi10oZDo1qC2MxGBm9o-vLvfgJyMOY7SlvTjS0CevztdP5i3bFbx553bDXgrkC12y7Vw"/>
</div>
</div>
</div>
</header>
<!-- Main Content: Login Card -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-md">
<div class="bg-white dark:bg-slate-900/50 rounded-xl shadow-xl shadow-primary/5 border border-primary/5 p-8 md:p-10">
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center size-14 rounded-full bg-primary/10 text-primary mb-4">
<span class="material-symbols-outlined text-3xl">lock_open</span>
</div>
<h2 class="text-2xl font-bold mb-2">Welcome Back</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to access your AI shopping assistant</p>
</div>
<form class="space-y-5">
<div>
<label class="block text-sm font-semibold mb-2">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full pl-11 pr-4 py-3 bg-background-light dark:bg-slate-800 border-primary/10 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="name@example.com" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-sm font-semibold">Password</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">key</span>
<input class="w-full pl-11 pr-4 py-3 bg-background-light dark:bg-slate-800 border-primary/10 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 py-1">
<input class="rounded border-primary/20 text-primary focus:ring-primary size-4" id="remember" type="checkbox"/>
<label class="text-sm text-slate-500 dark:text-slate-400" for="remember">Remember for 30 days</label>
</div>
<button class="w-full bg-primary text-white font-bold py-3.5 rounded-lg hover:shadow-lg hover:shadow-primary/20 transition-all active:scale-[0.98]" type="submit">
                        Login to Platform
                    </button>
</form>
<div class="mt-8 pt-8 border-t border-primary/10 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Register Now</a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex justify-center gap-6 text-xs font-medium text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Help Center</a>
</div>
</div>
</main>
<!-- Decorative Background Elements -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[30%] h-[30%] bg-primary/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
